<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sāma · Finanzas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f7;
  --sf:#fff;
  --sf2:#EBF7F5;
  --sf3:#D8EFEC;
  --tx:#0D2421;
  --tx2:#1F6B61;
  --tx3:#57A098;
  --bd:#B8E2DC;
  --bd2:#8ECEC7;
  --brand:#26c9b1;
  --brand-d:#1ba898;
  --brand-bg:#e6f9f6;
  --brand-light:#c8efea;
  --green:#1E7A47;
  --green-bg:#E8F5EE;
  --red:#C0392B;
  --red-bg:#FAEAE8;
  --orange:#C47A1A;
  --yellow:#C47A1A;
  --yellow-bg:#FEF6E4;
  --teal:#26c9b1;
  --teal-bg:#e6f9f6;
  --r:10px;
  --rl:14px;
  --rxl:20px;
  --sh:0 1px 4px rgba(38,201,177,.06),0 2px 8px rgba(38,201,177,.04);
  --sh2:0 4px 20px rgba(38,201,177,.12),0 2px 6px rgba(0,0,0,.05);
}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
input,select,textarea{font-family:'Inter',inherit;font-size:15px;background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);color:var(--tx);padding:10px 13px;width:100%;outline:none;transition:border-color .18s,box-shadow .18s;min-height:44px}
input:focus,select:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(38,201,177,.15)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
textarea{min-height:36px;resize:none;line-height:1.4}
button{font-family:'Inter',inherit;cursor:pointer;font-size:15px;font-weight:500}
.btn{background:var(--brand);color:#fff;border:none;border-radius:var(--r);padding:11px 20px;font-weight:600;font-size:15px;transition:background .18s;min-height:44px}
.btn:hover{background:var(--brand-d)}
.btn:active{opacity:.9}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-sm{padding:8px 16px;font-size:14px;min-height:36px}
.btn-g{background:transparent;border:1.5px solid var(--bd);color:var(--tx2);border-radius:var(--r);padding:10px 16px;font-size:15px;transition:all .18s;min-height:44px}
.btn-g:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-bg)}
.btn-g.active{background:var(--brand-bg);color:var(--brand);border-color:var(--brand);font-weight:600}
.btn-g.sm{padding:7px 14px;font-size:14px;min-height:36px}
.btn-g.red{border-color:#fca5a5;color:var(--red)}
.btn-g.red:hover{background:var(--red-bg);border-color:var(--red)}
.btn-del{background:transparent;border:none;color:var(--tx3);font-size:20px;min-width:36px;min-height:36px;border-radius:8px;transition:color .15s}
.btn-del:hover{color:var(--red)}
.card{background:var(--sf);border-radius:var(--rl);padding:1.25rem 1.5rem;border:1px solid var(--bd);box-shadow:var(--sh)}
.stitle{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px}
.pt{font-size:22px;font-weight:700;color:var(--tx);letter-spacing:-.3px}
.tab-btn{background:transparent;border:none;color:var(--tx3);padding:9px 18px;border-radius:var(--r);font-size:15px;white-space:nowrap;font-weight:500;transition:all .18s;min-height:44px}
.tab-btn:hover{color:var(--tx2);background:var(--sf3)}
.tab-btn.active{background:var(--sf);color:var(--brand);font-weight:600;border:1.5px solid var(--bd);box-shadow:var(--sh)}
/* Header */
.hdr{background:rgba(255,255,255,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:10;box-shadow:var(--sh)}
.hdr-top{padding:10px 28px;display:flex;align-items:center;justify-content:space-between}
.nav{padding:4px 22px 8px;display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}

.main{max-width:1000px;margin:0 auto;padding:28px 20px;padding-bottom:96px}
/* Budget */
.grp-card{margin-bottom:16px;border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh)}
.grp-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--sf2);cursor:pointer;user-select:none;border-bottom:1px solid var(--bd)}
.grp-hdr.collapsed{border-bottom:none}
.grp-hdr.income-hdr{background:var(--green-bg);border-bottom-color:#b8e0ca}
.grp-hdr.income-hdr.collapsed{border-bottom:none}
.budget-tbl{width:100%;border-collapse:collapse}
.budget-tbl th{font-size:12px;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;padding:10px 14px;text-align:right;font-weight:700;background:var(--sf2);border-bottom:1.5px solid var(--bd)}
.budget-tbl th.lft{text-align:left}
.budget-tbl td{border-bottom:1px solid var(--bd);font-size:15px;vertical-align:middle}
.budget-tbl tr:last-child td{border-bottom:none}
.budget-tbl .tot-row td{font-weight:700;background:var(--sf2);padding:12px 14px;font-size:15px;border-top:1.5px solid var(--bd2)}
.ni{background:var(--sf2);border:1.5px solid var(--bd);border-radius:var(--r);color:var(--tx);padding:8px 10px;font-size:15px;font-family:'Inter',inherit;text-align:right;width:100%;transition:all .18s;min-height:40px}
.ni:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(38,201,177,.12);outline:none;background:var(--sf)}
.note-i{background:transparent;border:none;border-bottom:1.5px dashed var(--bd2);border-radius:0;color:var(--tx3);padding:4px 6px;font-size:13px;font-style:italic;width:100%;resize:none;min-height:36px;outline:none}
.note-i:focus{border-color:var(--brand);color:var(--tx2)}
.iva-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;vertical-align:middle;margin-left:5px}
.iva-yes{background:#dbeafe;color:#1e40af}
.iva-no{background:#f3f4f6;color:#6b7280}
/* Transactions */
.tx-panel{background:var(--sf);border-radius:var(--rl);border:1px solid var(--bd);box-shadow:var(--sh);overflow:hidden}
.tx-ph{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--sf2);flex-wrap:wrap;gap:8px}
.tx-body{padding:14px;max-height:600px;overflow-y:auto}
.tx-row{display:flex;flex-direction:column;padding:10px 13px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:6px;font-size:14px;gap:0}
.tx-add{background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rl);padding:16px;margin-bottom:12px}
.empty{text-align:center;padding:40px 16px;color:var(--tx3);font-size:15px;line-height:1.6}
/* Dashboard */
.dash-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:28px}
@media(max-width:800px){.dash-grid{grid-template-columns:1fr 1fr}}
@media(max-width:520px){.dash-grid{grid-template-columns:1fr}}
.dash-c{background:var(--sf);border-radius:var(--rl);border:1px solid var(--bd);box-shadow:var(--sh);overflow:hidden}
.dash-ch{padding:14px 18px;border-bottom:1px solid var(--bd);font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;background:var(--sf2)}
.dash-cb{padding:16px 18px}
.kpi{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--bd)}
.kpi:last-child{border-bottom:none}
.kpi-l{font-size:14px;color:var(--tx3)}
.kpi-v{font-size:17px;font-weight:700}
.brk-card{background:var(--sf);border-radius:var(--rl);border:1px solid var(--bd);box-shadow:var(--sh);margin-bottom:10px;overflow:hidden}
.brk-h{padding:11px 16px;background:var(--sf2);border-bottom:1px solid var(--bd);font-size:15px;font-weight:500;color:var(--tx2)}
.brk-b{padding:12px 16px}
/* Advice */
.ab{background:var(--sf);border-radius:var(--rl);padding:1.75rem;border:1px solid var(--bd);line-height:1.75;box-shadow:var(--sh)}
.ab p{margin-bottom:12px;font-size:16px;color:var(--tx)}
/* Balance bar */
.bal-bar{position:fixed;bottom:0;left:0;right:0;z-index:20;background:rgba(255,255,255,.94);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--bd);box-shadow:0 -2px 12px rgba(38,201,177,.07)}
.bal-inner{max-width:1000px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.bal-bar-static{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);box-shadow:var(--sh);margin-top:16px}
.bal-bar-static .bal-inner{padding:16px 20px}
.bar-bg{height:7px;background:var(--sf3);border-radius:4px;overflow:hidden;margin-top:6px}
.bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:13px 20px;border-radius:var(--rl);font-size:15px;font-weight:600;z-index:999;display:none;max-width:380px;box-shadow:var(--sh2)}
/* Spinner */
.sp{display:inline-block;width:15px;height:15px;border:2px solid rgba(160,27,74,.2);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
/* Loading */
#ls{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:14px;color:var(--tx2);background:var(--bg)}
/* Login */
.lw{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;background:var(--bg)}
.lc{background:var(--sf);border-radius:var(--rxl);padding:2.75rem;width:100%;max-width:380px;border:1px solid var(--bd);box-shadow:var(--sh2)}
.alert-w{background:var(--yellow-bg);border:1.5px solid #f5c87a;color:#7a4e00;border-radius:var(--r);padding:11px 15px;font-size:15px;margin-bottom:14px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.b-ing{background:var(--green-bg);color:var(--green)}
.b-gas{background:var(--brand-bg);color:var(--brand)}
/* Tooltip */
.tt{position:relative;display:inline-block}
.tt-box{display:none;position:absolute;z-index:999;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1A0A12;color:#fff;border-radius:var(--rl);padding:13px 15px;font-size:13px;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.22);min-width:230px;pointer-events:none}
.tt-box::before{content:'';position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-bottom-color:#1A0A12}
.tt:hover .tt-box{display:block}
/* Tx note */
.tx-note{width:100%;margin-top:6px;padding:5px 8px;font-size:12px;font-family:'Inter',inherit;background:transparent;border:none;border-bottom:1px dashed var(--bd2);border-radius:0;color:var(--tx2);resize:none;min-height:28px;outline:none;transition:border-color .15s;line-height:1.4}
.tx-note:focus{border-color:var(--brand);color:var(--tx)}
.tx-note::placeholder{color:var(--tx3);font-style:italic}
/* Filter */
.filter-btn-group{display:flex;gap:4px}
.filter-select{display:none}
/* Mobile */
.bal-bar-mob{display:none}
.bal-bar-desk{display:block}
@media(max-width:600px){
  .bal-bar-desk{display:none}
  .bal-bar-mob{display:block}
}
@media(max-width:600px){
  body{font-size:15px}
  .main{padding:16px 12px;padding-bottom:20px}
  .hdr-top{padding:8px 14px}
  .nav{padding:4px 10px 8px}
  .tab-btn{padding:7px 11px;font-size:14px}
  .ph{margin-bottom:16px}
  .pt{font-size:18px}
  .grp-card{margin-bottom:12px}
  .grp-hdr{padding:12px 14px}
  .budget-tbl th,.budget-tbl td{font-size:13px}
  .ni{font-size:14px;padding:6px 8px;min-height:36px}
  .note-i{font-size:12px}
  .budget-tbl{display:block}
  .budget-tbl thead{display:none}
  .budget-tbl tbody{display:block}
  .budget-tbl tr{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--bd);padding:8px 10px;gap:6px}
  .budget-tbl tr.tot-row{display:flex;justify-content:space-between;padding:10px 14px}
  .budget-tbl td{border:none;padding:4px 0 !important}
  .budget-tbl td:first-child{grid-column:1/-1;font-size:13px;font-weight:600;color:var(--tx);padding-bottom:6px !important}
  .filter-btn-group{display:none}
  .filter-select{display:block}
  .tx-row{padding:10px 12px}
  .tx-ph{flex-direction:column;align-items:flex-start;gap:8px}
  .tx-body{padding:10px;max-height:none}
  .cat-search{width:130px !important;min-width:0 !important}
  .bal-inner{padding:10px 14px;gap:10px}
}
@media(max-width:480px){
  .tab-btn{padding:6px 8px;font-size:13px}
  .btn,.btn-g{font-size:14px;padding:9px 14px}
  .btn-sm,.btn-g.sm{font-size:13px;padding:6px 12px}
}
</style>
</head>

// ══════════════════════════════════════════════════════════════════════════════
// CONFIGURACIÓN FIREBASE
// Crea un proyecto en https://console.firebase.google.com y rellena los valores:
// ══════════════════════════════════════════════════════════════════════════════
var FBP = "sama-finanzas";       // ← ID de tu proyecto Firebase
var FBK = "TU_API_KEY_AQUI";    // ← API Key de tu proyecto Firebase
var FBU = "https://firestore.googleapis.com/v1/projects/" + FBP + "/databases/(default)/documents/";

// Clave de la API de Anthropic (para la pestaña Consejos)
var ANTHROPIC_KEY = "";  // ← Tu API key de Anthropic (opcional)

// ══════════════════════════════════════════════════════════════════════════════
// FIRESTORE REST API
// ══════════════════════════════════════════════════════════════════════════════
function fv(v) {
  if (!v) return null;
  if ("stringValue"  in v) return v.stringValue;
  if ("integerValue" in v) return Number(v.integerValue);
  if ("doubleValue"  in v) return v.doubleValue;
  if ("booleanValue" in v) return v.booleanValue;
  if ("nullValue"    in v) return null;
  if ("arrayValue"   in v) return (v.arrayValue.values || []).map(fv);
  if ("mapValue"     in v) {
    var o = {}, fs = v.mapValue.fields || {};
    Object.keys(fs).forEach(function(k) { o[k] = fv(fs[k]); });
    return o;
  }
  return null;
}
function tv(v) {
  if (v === null || v === undefined) return { nullValue: null };
  if (typeof v === "boolean") return { booleanValue: v };
  if (typeof v === "number") return Number.isInteger(v) ? { integerValue: String(v) } : { doubleValue: v };
  if (typeof v === "string") return { stringValue: v };
  if (Array.isArray(v)) return { arrayValue: { values: v.map(tv) } };
  if (typeof v === "object") {
    var fs = {};
    Object.keys(v).forEach(function(k) { fs[k] = tv(v[k]); });
    return { mapValue: { fields: fs } };
  }
  return { stringValue: String(v) };
}
function fbGet(col, id) {
  var url = FBU + col + "/" + encodeURIComponent(id) + "?key=" + FBK;
  return fetch(url).then(function(r) {
    if (r.status === 404) return null;
    return r.json();
  }).then(function(doc) {
    if (!doc || doc.error || !doc.fields) return null;
    var o = {};
    Object.keys(doc.fields).forEach(function(k) { o[k] = fv(doc.fields[k]); });
    return o;
  }).catch(function(e) { console.error("fbGet", col, id, e); return null; });
}
function fbSet(col, id, data) {
  var url = FBU + col + "/" + encodeURIComponent(id) + "?key=" + FBK;
  var fs = {};
  Object.keys(data).forEach(function(k) { fs[k] = tv(data[k]); });
  return fetch(url, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ fields: fs })
  }).then(function(r) {
    if (!r.ok) return r.json().then(function(e) { console.error("fbSet err", e); });
  }).catch(function(e) { console.error("fbSet", e); });
}

var S = {
  user: null, users: {},
  budgets: {}, notes: {}, transactions: {},
  tab: "budget",
  selYear: NOW.getFullYear(), selMonth: NOW.getMonth(),
  collapsed: { income: false, fixed: true, variable: true },
  addForm: {},
  adviceText: "", adviceLoading: false,
  txState: {}, txCatFilter: {}
};

function mk() { return S.selYear + "-" + String(S.selMonth + 1).padStart(2, "0"); }
function euro(n) { return new Intl.NumberFormat("es-ES", { style: "currency", currency: "EUR", minimumFractionDigits: 0, maximumFractionDigits: 2 }).format(n || 0); }
function getBud(uid) { return ((S.budgets[mk()] || {})[uid]) || {}; }
function getNotes(uid) { return ((S.notes[mk()] || {})[uid]) || {}; }
function getTx(uid) { return ((S.transactions[mk()] || {})[uid]) || []; }
function sumBG(uid, g) { return catsG(g).reduce(function(s, c) { return s + (+(getBud(uid)[c.id] || 0)); }, 0); }

// Ingresos totales presupuestados
function totIncomeBud() { return S.user ? sumBG(S.user.id, "income") : 0; }
// Gastos totales presupuestados
function totExpBud() {
  if (!S.user) return 0;
  return ["fixed","variable"].reduce(function(s, g) { return s + sumBG(S.user.id, g); }, 0);
}
// Balance neto
function netBalance() { return totIncomeBud() - totExpBud(); }
// Gasto real de transacciones
function totSpent(uid) {
  return getTx(uid).filter(function(t) { return t.categoryId && t.categoryId !== "ignorar" && !t.deleted && t.amount < 0; })
    .reduce(function(s, t) { return s + Math.abs(t.amount); }, 0);
}
// Ingresos reales de transacciones
function totIncomeReal(uid) {
  return getTx(uid).filter(function(t) { return t.categoryId && t.categoryId !== "ignorar" && !t.deleted && t.amount > 0; })
    .reduce(function(s, t) { return s + t.amount; }, 0);
}
function catSpent(uid, catId) {
  return getTx(uid).filter(function(t) { return t.categoryId === catId && t.categoryId !== "ignorar" && !t.deleted && t.amount < 0; })
    .reduce(function(s, t) { return s + Math.abs(t.amount); }, 0);
}
function catReal(uid, catId) {
  return getTx(uid).filter(function(t) { return t.categoryId === catId && t.categoryId !== "ignorar" && !t.deleted; })
    .reduce(function(s, t) { return s + (t.amount < 0 ? Math.abs(t.amount) : 0); }, 0);
}

function toast(msg, ok) {
  if (ok === undefined) ok = true;
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = ok ? "#1E7A47" : "#C0392B";
  t.style.color = "#fff";
  t.style.display = "block";
  clearTimeout(t._t);
  t._t = setTimeout(function() { t.style.display = "none"; }, 3500);
}

window.selP = function(id) { S.loginSel = id; S.loginErr = ""; render(); setTimeout(function() { var e = document.getElementById("pi"); if (e) e.focus(); }, 60); };
window.toLg = function() { S.loginMode = "login"; S.loginErr = ""; render(); };
window.toReg = function() { S.loginMode = "register"; S.loginSel = ""; S.loginErr = ""; render(); };
window.doLogin = function() {
  var u = S.users[S.loginSel];
  if (!u) { S.loginErr = "Selecciona un perfil"; render(); return; }
  var pi = document.getElementById("pi");
  if (!pi || u.pin !== pi.value) { S.loginErr = "PIN incorrecto"; render(); return; }
  S.user = u; localStorage.setItem("sama_sess", u.id); render();
};
window.doReg = function() {
  var name = ((document.getElementById("rn") || {}).value || "").trim();
  var pin  = ((document.getElementById("rp") || {}).value || "");
  if (!name) { S.loginErr = "Introduce un nombre"; render(); return; }
  if (pin.length !== 4 || !/^\d{4}$/.test(pin)) { S.loginErr = "El PIN debe tener 4 dígitos"; render(); return; }
  var id = "u_" + Date.now();
  var u = { id: id, name: name, pin: pin };
  S.users[id] = u;
  fbSet("sama_config", "users", S.users);
  S.user = u; localStorage.setItem("sama_sess", id); render();
};
window.logout = function() {
  localStorage.removeItem("sama_sess");
  S.user = null; S.loginMode = "login"; S.loginSel = ""; S.loginErr = "";
  render();
};

    return "<button class=\"tab-btn" + (S.tab === t[0] ? " active" : "") + "\" onclick=\"setTab('" + t[0] + "')\">" + t[1] + "</button>";
  }).join("");
  var content = S.tab === "budget" ? budHtml()
    : S.tab === "transactions" ? txHtml()
    : dashHtml();
  return "<header class=\"hdr\">"

function budHtml() {
  var uid = S.user.id;
  var incBud = sumBG(uid, "income");
  var expBud = totExpBud();
  var net = incBud - expBud;

  var grpCards = GROUPS.map(function(grp) {
    var coll = S.collapsed[grp.id] !== false;
    var isIncome = grp.id === "income";

    var catRows = "";
    if (!coll) {
      catsG(grp.id).forEach(function(cat) {
        var val  = getBud(uid)[cat.id] || "";
        var note = getNotes(uid)[cat.id] || "";
        var ivaBadge = isIncome && cat.iva !== undefined
          ? "<span class=\"iva-badge " + (cat.iva ? "iva-yes" : "iva-no") + "\">" + (cat.iva ? "+IVA" : "sin IVA") + "</span>"
          : "";
        var ttHtml = buildTT(uid, cat.id);
        catRows += "<tr>"
          + "<td style=\"padding:10px 16px;color:var(--tx2);font-size:15px;min-width:180px\">"
          + cat.name + ivaBadge
          + "</td>"

function evalExpr(raw) {
  var s = String(raw || "").trim();
  if (!s) return 0;
  if (/^[\d.]+$/.test(s)) return parseFloat(s) || 0;
  if (/^[\d.+\-*/\s()]+$/.test(s)) {
    try { var r = Function('"use strict";return(' + s + ')')(); return isFinite(r) ? Math.round(r * 100) / 100 : 0; } catch(e) { return parseFloat(s) || 0; }
  }
  return parseFloat(s) || 0;
}

function readBudDOM() {
  var m = mk(); var uid = S.user.id;
  if (!S.budgets[m]) S.budgets[m] = {};
  if (!S.notes[m]) S.notes[m] = {};
  document.querySelectorAll(".ni").forEach(function(inp) {
    var cat = inp.dataset.cat; if (!cat) return;
    if (!S.budgets[m][uid]) S.budgets[m][uid] = {};
    S.budgets[m][uid][cat] = evalExpr(inp.value);
  });
  document.querySelectorAll(".note-i").forEach(function(ta) {
    var cat = ta.dataset.cn; if (!cat) return;
    if (!S.notes[m][uid]) S.notes[m][uid] = {};
    S.notes[m][uid][cat] = ta.value;
  });
}

window.saveBuds = function() {
  readBudDOM();
  var uid = S.user.id; var m = mk();
  Promise.all([
    fbSet("sama_budgets", m + "_" + uid, { data: S.budgets[m][uid] || {} }),
    fbSet("sama_notes",   m + "_" + uid, { data: S.notes[m][uid] || {} })
  ]).then(function() { toast("Presupuesto guardado ✓"); });
};

window.loadPrevBud = function() {
  var yr = S.selYear, mo = S.selMonth;
  if (mo === 0) { yr--; mo = 11; } else { mo--; }
  var pmk = yr + "-" + String(mo + 1).padStart(2, "0");
  var uid = S.user.id;
  Promise.all([
    fbGet("sama_budgets", pmk + "_" + uid),
    fbGet("sama_notes",   pmk + "_" + uid)
  ]).then(function(r) {
    var m = mk();
    if (!S.budgets[m]) S.budgets[m] = {};
    if (!S.notes[m]) S.notes[m] = {};
    if (r[0] && r[0].data) S.budgets[m][uid] = Object.assign({}, r[0].data);
    if (r[1] && r[1].data) S.notes[m][uid] = Object.assign({}, r[1].data);
    toast("Mes anterior cargado. Pulsa Guardar para aplicar.");
    render();
  });
};

function prevMKs(n) {
  var keys = []; var yr = S.selYear, mo = S.selMonth;
  for (var i = 0; i < n; i++) {
    if (mo === 0) { yr--; mo = 11; } else { mo--; }
    keys.push({ key: yr + "-" + String(mo + 1).padStart(2, "0"), label: MONTHS[mo].slice(0,3) + " " + yr });
  }
  return keys;
}

function ensureHistLoaded(n) {
  var pks = prevMKs(n); var uid = S.user.id; var loads = [];
  if (!S._hl) S._hl = {};
  pks.forEach(function(pk) {
    if (!S._hl[pk.key + "_tx"]) {
      S._hl[pk.key + "_tx"] = true;
      if (!S.transactions[pk.key]) S.transactions[pk.key] = {};
      loads.push(fbGet("sama_transactions", pk.key + "_" + uid).then(function(d) { S.transactions[pk.key][uid] = d && d.list ? d.list : []; }));
    }
    if (!S._hl[pk.key + "_bu"]) {
      S._hl[pk.key + "_bu"] = true;
      if (!S.budgets[pk.key]) S.budgets[pk.key] = {};
      loads.push(fbGet("sama_budgets", pk.key + "_" + uid).then(function(d) { S.budgets[pk.key][uid] = d && d.data ? d.data : {}; }));
    }
  });
  return Promise.all(loads);
}

function buildTT(uid, catId) {
  var pks = prevMKs(3);
  var rows = pks.map(function(pk) {
    var bud = +((S.budgets[pk.key] && S.budgets[pk.key][uid] && S.budgets[pk.key][uid][catId]) || 0);
    var txs = (S.transactions[pk.key] && S.transactions[pk.key][uid]) || [];
    var spent = txs.filter(function(t) { return t.categoryId === catId && !t.deleted; })
      .reduce(function(s, t) { return s + Math.abs(t.amount); }, 0);
    return { label: pk.label, bud: bud, spent: spent };
  });
  var hasAny = rows.some(function(r) { return r.bud > 0 || r.spent > 0; });
  if (!hasAny) return "<span style=\"color:rgba(255,255,255,.5);font-style:italic\">Sin datos previos</span>";
  var hdr = "<div style=\"display:grid;grid-template-columns:auto 1fr 1fr;gap:3px 12px;font-size:11px;color:rgba(255,255,255,.5);margin-bottom:6px\"><span></span><span>Pres.</span><span>Real</span></div>";
  var body = rows.map(function(r) {
    return "<div style=\"display:grid;grid-template-columns:auto 1fr 1fr;gap:3px 12px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.1);font-size:12px\">"
      + "<span style=\"color:rgba(255,255,255,.55)\">" + r.label + "</span>"
      + "<span style=\"color:#f9a8d4;font-weight:600;text-align:right\">" + (r.bud > 0 ? euro(r.bud) : "—") + "</span>"
      + "<span style=\"color:#fff;font-weight:600;text-align:right\">" + (r.spent > 0 ? euro(r.spent) : "—") + "</span>"
      + "</div>";
  }).join("");
  var wb = rows.filter(function(r) { return r.bud > 0; }); var ws = rows.filter(function(r) { return r.spent > 0; });
  var ab = wb.length ? wb.reduce(function(s, r) { return s + r.bud; }, 0) / wb.length : 0;
  var as = ws.length ? ws.reduce(function(s, r) { return s + r.spent; }, 0) / ws.length : 0;
  var foot = "<div style=\"display:grid;grid-template-columns:auto 1fr 1fr;gap:3px 12px;margin-top:6px;padding-top:4px;font-size:12px;font-weight:700\">"
    + "<span style=\"color:rgba(255,255,255,.55)\">Media</span>"
    + "<span style=\"color:#f9a8d4;text-align:right\">" + (ab > 0 ? euro(ab) : "—") + "</span>"
    + "<span style=\"color:#4ade80;text-align:right\">" + (as > 0 ? euro(as) : "—") + "</span></div>";
  return hdr + body + foot;
}

function isRedondeo(r) {
  var sub = String(r[2] == null ? "" : r[2]).toLowerCase();
  var desc = String(r[3] == null ? "" : r[3]).toLowerCase();
  return sub.includes("redondeo") || desc.includes("redondeo");
}
function detectFmt(rows) {
  for (var i = 0; i < Math.min(rows.length, 6); i++) {
    var r = rows[i]; if (!r) continue;
    var vals = r.map(function(v) { return String(v == null ? "" : v).toUpperCase(); });
    if (vals.some(function(v) { return v.includes("SUBCATEGOR"); })) {
      return { headerRow: i, dateCol: 0, catCol: 1, subcatCol: 2, descCol: 3, amountCol: 5 };
    }
  }
  return null;
}
function parseRows(uid, rows) {
  var fmt = detectFmt(rows);
  if (fmt) {
    return rows.slice(fmt.headerRow + 1)
      .filter(function(r) { return r && r.some(function(c) { return c != null && c !== ""; }) && !isRedondeo(r); })
      .map(function(r, i) {
        var rawAmt = r[fmt.amountCol];
        var amt = typeof rawAmt === "number" ? rawAmt : parseFloat(String(rawAmt || "0").replace(/\./g, "").replace(",", ".")) || 0;
        var dv = r[fmt.dateCol]; var ds = "";
        if (dv instanceof Date) ds = dv.getFullYear() + "-" + String(dv.getMonth()+1).padStart(2,"0") + "-" + String(dv.getDate()).padStart(2,"0");
        else if (dv) ds = String(dv).slice(0, 10);
        return { id: uid + "_i_" + Date.now() + "_" + i, userId: uid, date: ds, bankCat: String(r[fmt.catCol] || ""), subcategory: String(r[fmt.subcatCol] || ""), description: String(r[fmt.descCol] || ""), amount: amt, categoryId: null };
      }).filter(function(t) { return t.description || t.amount; });
  }
  var h = (rows[0] || []).map(function(x) { return String(x || "").toLowerCase(); });
  var dI = h.findIndex(function(x) { return x.includes("fech") || x.includes("date"); });
  var dsI = h.findIndex(function(x) { return x.includes("concepto") || x.includes("descri"); });
  var aI = h.findIndex(function(x) { return x.includes("importe") || x.includes("amount") || x.includes("monto"); });
  return rows.slice(1).filter(function(r) { return r && r.some(function(c) { return c != null && c !== ""; }) && !isRedondeo(r); })
    .map(function(r, i) {
      var ra = aI >= 0 ? r[aI] : null;
      var amt = typeof ra === "number" ? ra : parseFloat(String(ra || "0").replace(",", ".")) || 0;
      return { id: uid + "_i_" + Date.now() + "_" + i, userId: uid, date: dI >= 0 ? String(r[dI] || "") : "", bankCat: "", subcategory: "", description: dsI >= 0 ? String(r[dsI] || "") : String(r[1] || ""), amount: amt, categoryId: null };
    }).filter(function(t) { return t.description || t.amount; });
}

var _xlsxReady = false; var _xlsxCbs = [];
function needXLSX(cb) {
  if (_xlsxReady) { cb(); return; }
  _xlsxCbs.push(cb);
  if (_xlsxCbs.length > 1) return;
  var s = document.createElement("script");
  s.src = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
  s.onload = function() { _xlsxReady = true; _xlsxCbs.forEach(function(f) { f(); }); _xlsxCbs = []; };
  s.onerror = function() { toast("No se pudo cargar el lector de Excel.", false); _xlsxCbs = []; };
  document.head.appendChild(s);
}

function amtKey(amt) { return parseFloat(parseFloat(amt).toFixed(2)).toString(); }
function txKey(t) { return (t.date||"") + "|" + (t.description||"").trim() + "|" + amtKey(t.amount||0); }

function importFile(uid, e) {
  var file = e.target.files[0]; if (!file) return;
  if (!S.importing) S.importing = {};
  S.importing[uid] = true; render();
  needXLSX(function() {
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var wb = XLSX.read(ev.target.result, { type: "array", cellDates: true });
        var ws = wb.Sheets[wb.SheetNames[0]];
        var rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: true });
        var parsed = parseRows(uid, rows);
        var m = mk();
        if (!S.transactions[m]) S.transactions[m] = {};
        var existing = S.transactions[m][uid] || [];
        var seen = {}; existing.forEach(function(t) { seen[txKey(t)] = 1; });
        var deletedSet = {}; existing.filter(function(t){ return t.deleted; }).forEach(function(t){ deletedSet[txKey(t)] = 1; });
        var newOnes = parsed.filter(function(t) { var k = txKey(t); return !seen[k] && !deletedSet[k]; });
        S.transactions[m][uid] = existing.concat(newOnes);
        saveTxU(uid);
        S.importing[uid] = false;
        toast(newOnes.length + " movimientos importados" + (parsed.length - newOnes.length > 0 ? " (" + (parsed.length - newOnes.length) + " ya existían)" : "") + ".");
        render();
      } catch (err) { console.error(err); S.importing[uid] = false; toast("Error al leer el archivo: " + err.message, false); render(); }
      e.target.value = "";
    };
    reader.readAsArrayBuffer(file);
  });
}

function saveTxU(uid) { var m = mk(); fbSet("sama_transactions", m + "_" + uid, { list: S.transactions[m][uid] || [] }); }

window.saveTxNote = function(uid, txId, val) {
  var m = mk(); var changed = false;
  S.transactions[m][uid] = (S.transactions[m][uid] || []).map(function(t) {
    if (t.id !== txId || (t.note || "") === val) return t;
    changed = true; return Object.assign({}, t, { note: val });
  });
  if (changed) saveTxU(uid);
};

function resolveCatId(val) {
  if (!val) return "";
  var byId = CATS.find(function(c) { return c.id === val; });
  if (byId) return byId.id;
  if (val === "ignorar" || val === "× Ignorar") return "ignorar";
  var byName = CATS.find(function(c) { return c.name.toLowerCase() === val.toLowerCase(); });
  if (byName) return byName.id;
  var partial = CATS.find(function(c) { return c.name.toLowerCase().includes(val.toLowerCase()); });
  if (partial) return partial.id;
  return "";
}

window.sCat = function(uid, txId, rawVal) {
  var cat = resolveCatId(rawVal);
  if (!cat && rawVal) return;
  var panelBody = document.querySelector(".tx-body");
  var scrollTop = panelBody ? panelBody.scrollTop : 0;
  var m = mk();
  S.transactions[m][uid] = (S.transactions[m][uid] || []).map(function(t) { return t.id === txId ? Object.assign({}, t, { categoryId: cat || null }) : t; });
  saveTxU(uid);
  render();
  var pb2 = document.querySelector(".tx-body");
  if (pb2) pb2.scrollTop = scrollTop;
};
window.delTx = function(uid, txId) {
  var m = mk();
  S.transactions[m][uid] = (S.transactions[m][uid] || []).map(function(t) { return t.id === txId ? Object.assign({}, t, { deleted: true, categoryId: "ignorar" }) : t; });
  saveTxU(uid); render();
};
window.restoreTx = function(uid, txId) {
  var m = mk();
  S.transactions[m][uid] = (S.transactions[m][uid] || []).map(function(t) { return t.id === txId ? Object.assign({}, t, { deleted: false, categoryId: null }) : t; });
  saveTxU(uid); render();
};
window.clearTx = function(uid) {
  if (!confirm("¿Borrar TODOS los movimientos de " + MONTHS[S.selMonth] + " " + S.selYear + "?")) return;
  var m = mk(); if (!S.transactions[m]) S.transactions[m] = {}; S.transactions[m][uid] = [];
  saveTxU(uid); toast("Movimientos borrados"); render();
};
window.setTxState = function(uid, st) { S.txState[uid] = st; if (st !== "done") S.txCatFilter[uid] = ""; render(); };
window.setTxCatFilter = function(uid, cat) { S.txCatFilter[uid] = cat; render(); };

// ══════════════════════════════════════════════════════════════════════════════
// RESUMEN / DASHBOARD
// ══════════════════════════════════════════════════════════════════════════════
function dashHtml() {
  var uid = S.user.id;
  var incBud = sumBG(uid, "income");
  var expBud = totExpBud();
  var balance = incBud - expBud;
  var balColor = balance >= 0 ? "var(--green)" : "var(--red)";

  function bigCard(icon, label, amount, color, sub) {
    return "<div class=\"dash-c\">"
      + "<div class=\"dash-ch\" style=\"border-top:3px solid " + color + "\">" + icon + " " + label + "</div>"
      + "<div class=\"dash-cb\" style=\"padding:28px 20px;text-align:center\">"
      + "<div style=\"font-size:38px;font-weight:700;color:" + color + ";letter-spacing:-.5px\">" + euro(amount) + "</div>"
      + (sub ? "<div style=\"font-size:12px;color:var(--tx3);margin-top:8px;line-height:1.5\">" + sub + "</div>" : "")
      + "</div></div>";
  }

  var incSub = catsG("income")
    .filter(function(c){ return (+(getBud(uid)[c.id]||0)) > 0; })
    .map(function(c){ return c.name + ": " + euro(+(getBud(uid)[c.id]||0)); }).join("<br>");
  var expSub = "Fijos: " + euro(sumBG(uid,"fixed")) + "<br>Variables: " + euro(sumBG(uid,"variable"));
  var balSub = balance >= 0 ? "Resultado positivo" : "Atención: resultado negativo";

  return "<div class=\"ph\"><div class=\"pt\">Resumen — " + MONTHS[S.selMonth] + " " + S.selYear + "</div></div>"
    + "<div class=\"dash-grid\">"
    + bigCard("📥", "Ingresos", incBud, "var(--green)", incSub)
    + bigCard("💸", "Gastos", expBud, "var(--brand)", expSub)
    + bigCard("⚖️", "Balance", balance, balColor, balSub)
    + "</div>";
}

function kpi(l, v, c) { return "<div class=\"kpi\"><span class=\"kpi-l\">" + l + "</span><span class=\"kpi-v\" style=\"color:" + (c||"var(--tx)") + "\">" + v + "</span></div>"; }
function kpiB(l, v) { return kpi(l, v, "var(--tx)"); }
function progBar(pct, isIncome) {
  var c = isIncome
    ? (pct >= 100 ? "var(--green)" : pct > 60 ? "var(--orange)" : "var(--red)")
    : (pct > 100 ? "var(--red)" : pct > 80 ? "var(--yellow)" : "var(--green)");
  return "<div class=\"bar-bg\"><div class=\"bar-fill\" style=\"width:" + Math.min(pct, 100) + "%;background:" + c + "\"></div></div>"
    + "<div style=\"font-size:11px;color:var(--tx3);margin-top:4px;text-align:right;font-weight:500\">" + Math.round(pct) + "%</div>";
}

// ══════════════════════════════════════════════════════════════════════════════
// BIND / UTILS
// ══════════════════════════════════════════════════════════════════════════════
function bindAll() {
  if (S.user) {
    var fi = document.getElementById("fi_" + S.user.id);
    if (fi) fi.addEventListener("change", function(e) { importFile(S.user.id, e); });
  }
  document.querySelectorAll(".ni").forEach(function(inp) {
    inp.addEventListener("input", function() { readBudDOM(); });
    inp.addEventListener("blur", function() {
      var val = evalExpr(inp.value); inp.value = val || "";
      readBudDOM(); render();
    });
    inp.addEventListener("keydown", function(e) { if (e.key === "Enter") { e.preventDefault(); this.blur(); } });
  });
  document.querySelectorAll(".note-i").forEach(function(ta) {
    ta.addEventListener("input", function() {
      this.style.height = "auto"; this.style.height = this.scrollHeight + "px"; readBudDOM();
    });
    ta.style.height = "auto"; ta.style.height = ta.scrollHeight + "px";
  });
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ══════════════════════════════════════════════════════════════════════════════
// CARGA DE DATOS
// ══════════════════════════════════════════════════════════════════════════════
function loadMonthData() {
  if (!S.user) return Promise.resolve();
  var uid = S.user.id; var m = mk();
  if (!S.budgets[m]) S.budgets[m] = {};
  if (!S.notes[m]) S.notes[m] = {};
  if (!S.transactions[m]) S.transactions[m] = {};
  return Promise.all([
    fbGet("sama_budgets", m + "_" + uid).then(function(d) { S.budgets[m][uid] = d && d.data ? d.data : {}; }),
    fbGet("sama_notes",   m + "_" + uid).then(function(d) { S.notes[m][uid]   = d && d.data ? d.data : {}; }),
    fbGet("sama_transactions", m + "_" + uid).then(function(d) { S.transactions[m][uid] = d && d.list ? d.list : []; })
  ]);
}

// ══════════════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════════════
fbGet("sama_config", "users").then(function(r) {
  if (r) S.users = r;
}).then(function() {
  var sess = localStorage.getItem("sama_sess");
  if (sess && S.users[sess]) S.user = S.users[sess];
  if (S.user) {
    return loadMonthData().then(function() {
      if (S.tab === "budget") return ensureHistLoaded(3);
    });
  }
}).then(function() {
  document.getElementById("ls").style.display = "none";
  document.getElementById("app").style.display = "block";
  render();
}).catch(function(e) {
  console.error("Init error", e);
  var el = document.getElementById("le");
  if (el) {
    el.innerHTML = "Error al conectar con Firebase.<br><small>" + e.message + "</small><br><br>"
      + "<button onclick='location.reload()' style='padding:9px 18px;background:var(--brand);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit'>Reintentar</button>";
    el.style.display = "block";
  }
});
</script>
